name: Build ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Cache dl
      uses: actions/cache@v4
      with:
        path: immortalwrt/dl
        key: dl-${{ runner.os }}

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-${{ runner.os }}

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3 python3-pyelftools rsync unzip zlib1g-dev file wget ccache

    - name: Clone source
      run: |
        git clone --depth 1 -b openwrt-23.05 https://github.com/immortalwrt/immortalwrt.git
        cd immortalwrt
        cp ../config .config
        cp -r ../files ./

    - name: Feeds
      run: |
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure
      run: |
        cd immortalwrt
        make defconfig

    - name: Download
      run: |
        cd immortalwrt
        make download -j8

    - name: Build
      run: |
        cd immortalwrt
        export CCACHE_DIR=~/.ccache
        export CC="ccache gcc"
        export CXX="ccache g++"
        make -j4

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: immortalwrt/bin/targets/*/*/*.img.gz
